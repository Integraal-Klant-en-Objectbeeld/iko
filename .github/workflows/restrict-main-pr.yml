name: Restrict PRs to main

on:
    pull_request:
        branches:
            - main

jobs:
    check-source-branch:
        runs-on: ubuntu-latest
        steps:
            - name: Check source branch is rc/**
              env:
                  BASE_REF: ${{ github.base_ref }}
                  HEAD_REF: ${{ github.head_ref }}
              run: |
                  echo "Base branch: ${BASE_REF}"
                  echo "Head branch: ${HEAD_REF}"

                  if [[ "${HEAD_REF}" != rc/* ]]; then
                    echo "Only branches matching 'rc/**' (rc/*) can open PRs to main."
                    exit 1
                  fi