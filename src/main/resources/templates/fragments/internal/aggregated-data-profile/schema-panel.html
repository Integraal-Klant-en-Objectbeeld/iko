<div th:fragment="schema-panel" id="schema-panel-content">
    <cds-tile>
        <div th:if="${aggregatedDataProfile.jsonschema != null}">
            <div
                id="schema-editor"
                data-monaco
                data-language="json"
                data-readonly="true"
                data-format-json
                th:data-initial="${aggregatedDataProfile.jsonschema}"
                data-theme="lightgray-theme"
                class="monaco-editor-style"
            ></div>
        </div>
        <cds-inline-notification
            th:if="${aggregatedDataProfile.jsonschema == null}"
            kind="info"
            title="Schema not yet generated"
            subtitle="Save the profile with a result transform change or click Regenerate to generate the schema."
            hide-close-button
        ></cds-inline-notification>
        <cds-button
            kind="secondary"
            size="sm"
            th:hx-post="@{|/admin/aggregated-data-profiles/${aggregatedDataProfile.id}/schema/regenerate|}"
            hx-target="#schema-panel-content"
            hx-swap="outerHTML"
            style="margin-top: var(--cds-spacing-05)"
        >
            Regenerate Schema
        </cds-button>
    </cds-tile>
</div>
