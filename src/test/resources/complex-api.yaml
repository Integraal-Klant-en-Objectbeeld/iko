openapi: 3.1.0
info:
    title: Complex Mock API
    description: Mock API for testing OpenAPI 3.1 features, discriminators, and allOf enum patterns
    version: 1.0.0
servers:
    -   url: /api
paths:
    /items:
        get:
            operationId: "GetItems"
            summary: Get items with OpenAPI 3.1 typed properties
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Item'
    /persons:
        post:
            operationId: "QueryPersons"
            summary: Query persons with discriminated union response
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PersonenQueryResponse'
    /cases:
        get:
            operationId: "GetCases"
            summary: Get cases with allOf-wrapped enum properties
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Case'

components:
    schemas:
        Item:
            type:
                - "object"
            properties:
                id:
                    type:
                        - "integer"
                name:
                    type:
                        - "string"
                active:
                    type:
                        - "boolean"
                score:
                    type:
                        - "number"

        PersonenQueryResponse:
            type: object
            properties:
                type:
                    type: string
            discriminator:
                propertyName: type
                mapping:
                    RaadpleegMetBurgerservicenummer: '#/components/schemas/RaadpleegMetBurgerservicenummerResponse'

        RaadpleegMetBurgerservicenummerResponse:
            allOf:
                -   $ref: '#/components/schemas/PersonenQueryResponse'
                -   type: object
                    properties:
                        personen:
                            type: array
                            items:
                                $ref: '#/components/schemas/Persoon'

        Persoon:
            type: object
            properties:
                burgerservicenummer:
                    type: string
                    example: "999993653"
                naam:
                    type: object
                    properties:
                        voornamen:
                            type: string
                            example: "Jan"

        StatusEnum:
            type: string
            enum:
                - open
                - closed
                - in_progress

        PriorityEnum:
            type: string
            enum:
                - high
                - medium
                - low

        Case:
            type: object
            properties:
                id:
                    type: integer
                status:
                    allOf:
                        -   $ref: '#/components/schemas/StatusEnum'
                priority:
                    allOf:
                        -   $ref: '#/components/schemas/PriorityEnum'
                        -   description: The priority level of the case
