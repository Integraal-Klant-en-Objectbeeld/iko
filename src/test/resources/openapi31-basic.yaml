openapi: "3.1.0"
info:
    title: OpenAPI 3.1 Test Spec
    version: "1.0.0"
paths:
    /items:
        get:
            operationId: "GetItems"
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: integer
                                    name:
                                        type: string
                                    active:
                                        type: boolean
                                    score:
                                        type: number
                                    tags:
                                        type: array
                                        items:
                                            type: string