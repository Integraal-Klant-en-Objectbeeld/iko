<th:block th:fragment="connector-list">
    <div
        th:replace="~{layout-internal :: breadcrumb (${ {{'Connectors', '/admin/connectors'}} })}"
    ></div>
    <div
        th:replace="~{layout-internal :: page-header (title='Connectors')}"
    ></div>
    <!-- Data table -->
    <cds-table id="profile-table">
        <!-- Toolbar + search -->
        <cds-table-toolbar slot="toolbar">
            <cds-table-toolbar-content>
                <cds-table-toolbar-search
                    id="search-bar"
                    placeholder="Type to search..."
                    th:value="${query}"
                    th:expanded="${query} ?: 'true'"
                    name="query"
                    size="lg"
                    hx-get="/admin/connectors/filter"
                    hx-params="*"
                    hx-trigger="input delay:600ms, keyup[key=='Enter']"
                    hx-target="#search-results"
                    hx-swap="outerHTML"
                    hx-push-url="true"
                    hx-vals="js:{
                        isActive: document.querySelector('#active-filter-toggle')?.checked ?? true,
                        sort: new URLSearchParams(window.location.search).get('sort') || ''
                    }"
                >
                </cds-table-toolbar-search>
                <cds-overflow-menu>
                    <svg
                        focusable="false"
                        preserveAspectRatio="xMidYMid meet"
                        xmlns="http://www.w3.org/2000/svg"
                        fill="var(--cds-icon-primary)"
                        slot="icon"
                        width="16"
                        height="16"
                        viewBox="0 0 32 32"
                        aria-hidden="true"
                    >
                        <path
                            d="M27 16.76V16v-.77l1.92-1.68A2 2 0 0029.3 11l-2.36-4a2 2 0 00-1.73-1 2 2 0 00-.64.1l-2.43.82a11.35 11.35 0 00-1.31-.75l-.51-2.52a2 2 0 00-2-1.61h-4.68a2 2 0 00-2 1.61l-.51 2.52a11.48 11.48 0 00-1.32.75l-2.38-.86A2 2 0 006.79 6a2 2 0 00-1.73 1L2.7 11a2 2 0 00.41 2.51L5 15.24v1.53l-1.89 1.68A2 2 0 002.7 21l2.36 4a2 2 0 001.73 1 2 2 0 00.64-.1l2.43-.82a11.35 11.35 0 001.31.75l.51 2.52a2 2 0 002 1.61h4.72a2 2 0 002-1.61l.51-2.52a11.48 11.48 0 001.32-.75l2.42.82a2 2 0 00.64.1 2 2 0 001.73-1l2.28-4a2 2 0 00-.41-2.51zM25.21 24l-3.43-1.16a8.86 8.86 0 01-2.71 1.57L18.36 28h-4.72l-.71-3.55a9.36 9.36 0 01-2.7-1.57L6.79 24l-2.36-4 2.72-2.4a8.9 8.9 0 010-3.13L4.43 12l2.36-4 3.43 1.16a8.86 8.86 0 012.71-1.57L13.64 4h4.72l.71 3.55a9.36 9.36 0 012.7 1.57L25.21 8l2.36 4-2.72 2.4a8.9 8.9 0 010 3.13L27.57 20zM16 22a6 6 0 116-6 5.94 5.94 0 01-6 6zm0-10a4 4 0 104 4 4 4 0 00-4-4z"
                        ></path>
                    </svg>
                    <span slot="tooltip-content">Filters</span>
                    <cds-overflow-menu-body flipped="">
                        <cds-overflow-menu-item style="pointer-events: none">
                            <cds-checkbox
                                id="active-filter-toggle"
                                th:checked="${isActive == null or isActive}"
                                hx-get="/admin/connectors/filter"
                                hx-target="#search-results"
                                hx-swap="outerHTML"
                                hx-push-url="true"
                                hx-trigger="cds-checkbox-changed"
                                hx-vals="js:{
                                    isActive: event.detail.checked,
                                    size: document.querySelector('#pagination-container')?.pageSize || 10,
                                    page: 0,
                                    query: document.querySelector('#search-bar')?.value || '',
                                    sort: new URLSearchParams(window.location.search).get('sort') || ''
                                }"
                                style="pointer-events: auto"
                                >Active</cds-checkbox
                            >
                        </cds-overflow-menu-item>
                    </cds-overflow-menu-body>
                </cds-overflow-menu>
                <cds-button
                    hx-get="/admin/connectors/create"
                    hx-target="#modal-container"
                    kind="primary"
                >
                    Add connector
                    <svg
                        focusable="false"
                        preserveAspectRatio="xMidYMid meet"
                        xmlns="http://www.w3.org/2000/svg"
                        fill="currentColor"
                        aria-hidden="true"
                        width="16"
                        height="16"
                        viewBox="0 0 32 32"
                        slot="icon"
                    >
                        <path
                            d="M17 15L17 8 15 8 15 15 8 15 8 17 15 17 15 24 17 24 17 17 24 17 24 15z"
                        ></path>
                    </svg>
                </cds-button>
            </cds-table-toolbar-content>
        </cds-table-toolbar>

        <!-- Header -->
        <cds-table-head th:if="${!#lists.isEmpty(connectors)}">
            <cds-table-header-row>
                <cds-table-header-cell
                    is-sortable
                    size="md"
                    class="col-width-30"
                    hx-get="/admin/connectors/filter"
                    hx-target="#search-results"
                    hx-swap="outerHTML"
                    hx-push-url="true"
                    hx-trigger="cds-table-header-cell-sort"
                    hx-vals="js:{
                        sort: 'name,' + ({ none: '', ascending: 'ASC', descending: 'DESC' }[event.detail.sortDirection] ?? ''),
                        size: document.querySelector('#pagination-container').pageSize,
                        page: document.querySelector('#pagination-container').page - 1,
                        query: document.querySelector('#search-bar').value,
                        isActive: document.querySelector('#active-filter-toggle')?.checked ?? true
                        }"
                >
                    Name
                </cds-table-header-cell>
                <cds-table-header-cell class="col-width-30">
                    Reference
                </cds-table-header-cell>
                <cds-table-header-cell class="col-width-15">
                    Version
                </cds-table-header-cell>
                <cds-table-header-cell> Status </cds-table-header-cell>
                <cds-table-header-cell> Active </cds-table-header-cell>
            </cds-table-header-row>
        </cds-table-head>

        <th:block
            th:insert="~{fragments/internal/connector/filter-results :: connector-filter-results}"
        ></th:block>
    </cds-table>
    <!-- Pagination -->
    <cds-pagination
        id="pagination-container"
        size="md"
        th:attr="page=${page.number + 1},
                                  totalPages=${page.totalPages},
                                  total-items=${page.totalElements},
                                  page-size=${page.size}"
        hx-trigger="cds-pagination-changed-current from:closest cds-pagination"
        hx-get="/admin/connectors/filter"
        hx-target="#search-results"
        hx-swap="outerHTML"
        hx-push-url="true"
        hx-vals="js:{
                      size: document.querySelector('#pagination-container').pageSize,
                      page: document.querySelector('#pagination-container').page - 1,
                      query: document.querySelector('#search-bar').value,
                      isActive: document.querySelector('#active-filter-toggle')?.checked ?? true,
                      sort: new URLSearchParams(window.location.search).get('sort') || ''
                    }"
    >
        <cds-select-item value="10">10</cds-select-item>
        <cds-select-item value="20">20</cds-select-item>
        <cds-select-item value="30">30</cds-select-item>
        <cds-select-item value="40">40</cds-select-item>
        <cds-select-item value="50">50</cds-select-item>
    </cds-pagination>
</th:block>
